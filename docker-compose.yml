services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cartsys-sqlserver
    environment:
      SA_PASSWORD: "Cartsys@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Cartsys@123", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartsys-backend
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CartsysDb;User Id=sa;Password=Cartsys@123;TrustServerCertificate=True;"
      Jwt__Key: "CartsysSecretKey2024!@#$%^&*SuperSecureKey"
      Jwt__Issuer: "cartsys-api"
      Jwt__Audience: "cartsys-frontend"
      AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cartsys-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
